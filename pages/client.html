<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Status Pelayanan</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <h1>Cek Status Pelayanan Anda</h1>
    <form id="searchForm">
        <label for="nikPemohon">Kode (NIK Pemohon):</label>
        <input type="text" id="nikPemohon" placeholder="Masukkan NIK Pemohon" required minlength="16" maxlength="16" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        <button type="submit">Cari Status</button>
    </form>
    <div id="statusOutput"></div>

    <script src="../script.js"></script>
</body>
</html>
