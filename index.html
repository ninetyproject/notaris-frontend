<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Notaris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Tampilan Awal -->
    <div class="container" id="homePage">
        <h1>Selamat Datang di Aplikasi Notaris</h1>
        <button onclick="window.location.href='pages/client.html'">CEK STATUS PELAYANAN ANDA</button>
        <a href="#" id="notarisLink" class="notaris-link">Masuk sebagai Notaris</a>
    </div>

    <!-- Halaman Login -->
    <div class="container" id="loginPage" style="display: none;">
        <h2>Login Notaris</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="errorMsg" style="color: red;"></p>
        <p id="capsWarning" style="color: red; display: none;">CAPSLOCK AKTIF</p>
        <a href="index.html" class="back-link">Kembali ke Halaman Utama</a>
    </div>

    <!-- Popup structure for login -->
    <div id="loginPopup" class="popup">
        <div class="popup-content">
            <p id="loginPopupMessage">Mohon Masukkan Username atau Password yang Valid</p>
            <button id="closeLoginPopup" class="popup-button">OK</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
